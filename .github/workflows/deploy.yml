name: Build and Deploy

on:
  push:
    branches: [master]

env:
  IMAGE: doublethinklab/ohub_linebot
  DEPLOY_HOST: 185.88.141.50
  DEPLOY_USER: deployuser
  DEPLOY_DIR: /srv/rumors-line-bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: andy4096
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALPHA_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Push env file
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          echo "$PROD_ENV" | ssh -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "cat > ${{ env.DEPLOY_DIR }}/.env"

      - name: Pull image and restart app
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
            "docker pull ${{ env.IMAGE }}:${{ github.sha }} && \
             APP_IMAGE=${{ env.IMAGE }}:${{ github.sha }} \
             docker compose -f ${{ env.DEPLOY_DIR }}/docker-compose.yml up -d app"

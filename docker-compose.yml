version: '3.8'
services:
  mongo-container:
    image: mongo:8
    container_name: mongodb
    environment:
        - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
        - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - "./data/mongo:/data/db"
    command: mongod
    restart: unless-stopped

  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server
    restart: unless-stopped

  app:
    container_name: rumors-line-bot
    image: rumors-line-bot
    depends_on:
      - mongo-container
      - redis
    env_file:
      - .env
    expose:
      - "5001"
    volumes:
      - "./credentials:/srv/www/credentials:ro"
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./nginx/ohub.dtl.tw.conf:/etc/nginx/conf.d/default.conf:ro"
      - "./credentials/origin.crt:/etc/nginx/certs/origin.crt:ro"
      - "./credentials/origin.key:/etc/nginx/certs/origin.key:ro"
    restart: unless-stopped
